services:
  # ===========================================================================
  # POSTIZ: MAIN APPLICATION CONTENT CORE
  # ===========================================================================
  postiz:
    #image: ghcr.io/gitroomhq/postiz-app:v2.21.7
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: postiz
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: 'production'
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - maite_supreme

  # ===========================================================================
  # TEMPORAL STACK: ISOLATED WORKFLOW ENGINE
  # ===========================================================================
  temporal-elasticsearch:
    container_name: temporal-elasticsearch
    image: elasticsearch:7.17.27
    restart: always
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - maite_supreme
    volumes:
      - temporal_es_data:/usr/share/elasticsearch/data

  # Temporal's dedicated database (Keeps noisy workflow data out of global_postgres)
  temporal-postgresql:
    container_name: temporal-postgresql
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    networks:
      - maite_supreme
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data

  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.28.1
    restart: always
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    networks:
      - maite_supreme
    healthcheck:
      test: ["CMD-SHELL", "tctl --ns default --address temporal:7233 namespace describe || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s


  temporal-admin-tools:
    container_name: temporal-admin-tools
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - maite_supreme
    stdin_open: true
    depends_on:
      - temporal
    tty: true

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.34.0
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://127.0.0.1:3000
    networks:
      - maite_supreme

# ===========================================================================
# VOLUMES & NETWORKS MANAGEMENT
# ===========================================================================
volumes:
  postiz-config:
  postiz-uploads:
  temporal_es_data:
  temporal_pg_data:

networks:
  maite_supreme:
    external: true
