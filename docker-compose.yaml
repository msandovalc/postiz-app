services:
  # ===========================================================================
  # POSTIZ: MAIN APPLICATION CONTENT CORE
  # ===========================================================================
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:v2.21.7
    container_name: postiz
    restart: always
    environment:
      NODE_ENV: 'production'

      # === URLs & Routing (Point to your domain, Caddy handles HTTPS)
      PORT: '3001'
      MAIN_URL: 'https://social.evo-omni-engine.duckdns.org'
      FRONTEND_URL: 'https://social.evo-omni-engine.duckdns.org'
      NEXT_PUBLIC_BACKEND_URL: 'https://social.evo-omni-engine.duckdns.org/api'
      BACKEND_INTERNAL_URL: 'http://postiz:3001'

      # === Security
      JWT_SECRET: 'JdiI0LOEM981nyHVUfPl_SECRET_KEY_FOR_POSTIZ'
      NEXTAUTH_SECRET: 'JdiI0LOEM981nyHVUfPl_SECRET_KEY_FOR_POSTIZ'

      # === Infrastructure Connections (Postiz uses global DB and Redis)
      DATABASE_URL: 'postgresql://postiz_admin:JdiI0LOEM981nyHVUfPl@global_postgres:5432/postiz_db'
      REDIS_URL: 'redis://global_redis:6379'
      TEMPORAL_ADDRESS: 'temporal:7233'
      NEXTAUTH_URL: 'https://social.evo-omni-engine.duckdns.org'
      #NEXTAUTH_COOKIE_NAME: 'auth'
      #NEXTAUTH_COOKIE_DOMAIN: 'social.evo-omni-engine.duckdns.org'
      COOKIE_DOMAIN: ''

      # === App Flags
      IS_GENERAL: 'true'
      DISABLE_REGISTRATION: 'false' # Protects instance from external registrations

      # === Storage Settings
      STORAGE_PROVIDER: 'local'
      UPLOAD_DIRECTORY: '/uploads'
      NEXT_PUBLIC_UPLOAD_DIRECTORY: '/uploads'

      # === Social Media API Settings (Blank, handled via frontend OAuth)
      X_URL: ''
      X_API_KEY: ''
      X_API_SECRET: ''
      LINKEDIN_CLIENT_ID: ''
      LINKEDIN_CLIENT_SECRET: ''
      REDDIT_CLIENT_ID: ''
      REDDIT_CLIENT_SECRET: ''
      GITHUB_CLIENT_ID: ''
      GITHUB_CLIENT_SECRET: ''
      BEEHIIVE_API_KEY: ''
      BEEHIIVE_PUBLICATION_ID: ''
      THREADS_APP_ID: ''
      THREADS_APP_SECRET: ''
      FACEBOOK_APP_ID: ''
      FACEBOOK_APP_SECRET: ''
      YOUTUBE_CLIENT_ID: ''
      YOUTUBE_CLIENT_SECRET: ''
      TIKTOK_CLIENT_ID: ''
      TIKTOK_CLIENT_SECRET: ''
      PINTEREST_CLIENT_ID: ''
      PINTEREST_CLIENT_SECRET: ''
      DRIBBBLE_CLIENT_ID: ''
      DRIBBBLE_CLIENT_SECRET: ''
      DISCORD_CLIENT_ID: ''
      DISCORD_CLIENT_SECRET: ''
      DISCORD_BOT_TOKEN_ID: ''
      SLACK_ID: ''
      SLACK_SECRET: ''
      SLACK_SIGNING_SECRET: ''
      MASTODON_URL: 'https://mastodon.social'
      MASTODON_CLIENT_ID: ''
      MASTODON_CLIENT_SECRET: ''

      # === Misc Settings
      OPENAI_API_KEY: ''
      NEXT_PUBLIC_DISCORD_SUPPORT: ''
      NEXT_PUBLIC_POLOTNO: ''
      API_LIMIT: 100 # High limits for high-volume automated pipeline bursts

      # === Payment / Stripe Settings
      FEE_AMOUNT: 0.05
      STRIPE_PUBLISHABLE_KEY: ''
      STRIPE_SECRET_KEY: ''
      STRIPE_SIGNING_KEY: ''
      STRIPE_SIGNING_KEY_CONNECT: ''

      # === Developer Settings
      NX_ADD_PLUGINS: 'false'
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - maite_supreme

  # ===========================================================================
  # TEMPORAL STACK: ISOLATED WORKFLOW ENGINE
  # ===========================================================================
  temporal-elasticsearch:
    container_name: temporal-elasticsearch
    image: elasticsearch:7.17.27
    restart: always
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - maite_supreme
    volumes:
      - temporal_es_data:/usr/share/elasticsearch/data

  # Temporal's dedicated database (Keeps noisy workflow data out of global_postgres)
  temporal-postgresql:
    container_name: temporal-postgresql
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    networks:
      - maite_supreme
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data

  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.28.1
    restart: always
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    networks:
      - maite_supreme
    healthcheck:
      test: ["CMD-SHELL", "tctl --ns default --address temporal:7233 namespace describe || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s


  temporal-admin-tools:
    container_name: temporal-admin-tools
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - maite_supreme
    stdin_open: true
    depends_on:
      - temporal
    tty: true

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.34.0
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://127.0.0.1:3000
    networks:
      - maite_supreme

# ===========================================================================
# VOLUMES & NETWORKS MANAGEMENT
# ===========================================================================
volumes:
  postiz-config:
  postiz-uploads:
  temporal_es_data:
  temporal_pg_data:

networks:
  maite_supreme:
    external: true
